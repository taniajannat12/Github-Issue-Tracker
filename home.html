<section class="w-full py-4">
  <div class="navbar bg-base-100 shadow-sm flex justify-between items-center px-4 rounded-lg">
    
    <div class="flex items-center gap-2">
      <img class="w-8 h-8" src="assets/github-logo.png" alt="Logo">
      <a class="font-bold text-xl">Github Issues Tracker</a>
    </div>

    <div class="flex items-center gap-4">
      <div class="form-control">
        <label  class="input input-bordered flex items-center gap-2 w-24 md:w-auto"> <i class="fa-solid fa-magnifying-glass"></i>
       <input id="search" onkeyup="Search()" placeholder="Search" class="input input-bordered w-24 md:w-auto" /></label>
      
    </div>
      
      <div class="dropdown dropdown-end">
        <button  class="btn btn-primary">+ New Issue</button>
      </div>
    </div>

  </div>
</section>



<div id="spinner" class="container mx-auto text-center hidden">
  <span   class="loading loading-spinner loading-xl"></span>
</div>

<section class="container mx-auto">
<div class="p-2  bg-base-100 shadow-sm flex rounded-lg gap-5">
<button onclick="filterissue('all')" class="btn btn-primary  ">All</button>
<button onclick="filterissue('open')" class="btn bg-white text-gray-500">Open</button>
<button  onclick="filterissue('closed')" class="btn bg-white text-gray-500">Closed</button>
</div>











<section class="mx-auto flex justify-between items-center bg-white p-6 shadow-sm rounded-xl border border-gray-100 mt-9">
    
    <div class="flex items-center gap-4">
        <img class="w-12 h-12" src="assets/Aperture.png" alt="">
        <div>
            <h2 id="count" class="text-2xl font-bold">50 Issues</h2>
            <p class="text-gray-500 text-sm">Track and manage your project issues</p>
        </div>
    </div>
    
    <div class="flex gap-8">
        <div class="flex items-center gap-2">
            <img class="w-6 h-6" src="assets/Open-Status.png" alt="Open">
            <p class="font-medium">Open</p>
        </div>
        <div class="flex items-center gap-2">
            <img class="w-6 h-6" src="assets/Closed- Status .png" alt="Closed">
            <p class="font-medium">Closed</p>
        </div>
    </div>

</section>

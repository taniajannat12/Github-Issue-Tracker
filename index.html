<body>
    <section class="mx-auto">
   
        <img  class=" mx-auto" src="assets/github-logo.png" alt="">
        <h1 class="font-bold text-center text-3xl pt-8 pb-8">Github Issues Tracker</h1>
        <p class="text-center text-gray-400 ">Sign in to manage your issues</p>
<div class="hero bg-white pt-8">
  
    <div class="card w-full max-w-sm shrink-0 ">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label">Username</label>
          <input id="name" type="name" class="input" placeholder="Enter Username" />
          <label class="label">Password</label>
          <input id="pass" type="password" class="input" placeholder="Enter Password" />
         
          <button  id="sign" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
      </div>
    </div>
  </div>

   
 </section>
